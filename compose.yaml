name: openpolitics-lens

services:
  postgres:
    image: postgres:18.4-trixie
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openpolitics}
      POSTGRES_USER: ${POSTGRES_USER:-openpolitics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openpolitics_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openpolitics}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openpolitics_minio_dev_password}
      MINIO_REGION_NAME: ${S3_REGION:-ap-northeast-1}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-openpolitics}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-openpolitics_minio_dev_password}
      S3_BUCKET: ${S3_BUCKET:-openpolitics-raw}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc version enable "local/$${S3_BUCKET}"

  neo4j:
    image: neo4j:2026.05.0
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/openpolitics_neo4j_dev_password}
      NEO4J_dbms_security_auth__enabled: "true"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#neo4j/}\" 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  meilisearch:
    image: getmeili/meilisearch:v1.37
    restart: unless-stopped
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-openpolitics_meili_dev_master_key}
      MEILI_DB_PATH: /meili_data
    ports:
      - "127.0.0.1:${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  minio_data:
  neo4j_data:
  neo4j_logs:
  meilisearch_data:
